<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#202020"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#e8381f"/>
      <stop offset="0.55" stop-color="#ff6a2b"/>
      <stop offset="1" stop-color="#ffb02e"/>
    </linearGradient>
    <linearGradient id="smoke" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#9aa0a6"/>
      <stop offset="1" stop-color="#eef1f4"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="103.5" fill="none" stroke="#3a3a3a" stroke-width="3"/>

  <!-- rising smoke signal puffs -->
  <g fill="url(#smoke)">
    <circle cx="262" cy="318" r="30" opacity="0.55"/>
    <circle cx="232" cy="250" r="44" opacity="0.78"/>
    <circle cx="286" cy="166" r="62" opacity="1"/>
    <circle cx="244" cy="120" r="26" opacity="0.85"/>
  </g>

  <!-- flame at the base (the fire it catches) -->
  <path fill="url(#flame)" d="M256 300
    C 292 332 296 372 270 406
    C 266 410 262 410 258 407
    C 230 384 230 344 256 314
    C 257 332 268 334 268 320
    C 268 311 261 305 256 300 Z"/>
  <path fill="#ffd66b" opacity="0.9" d="M258 350
    C 276 366 276 388 261 402
    C 247 392 246 372 258 350 Z"/>
</svg>
