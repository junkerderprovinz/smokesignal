name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: ShellCheck the engine
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          # fail the build on errors only; style warnings (e.g. SC2155) don't block
          shellcheck -S error src/usr/local/emhttp/plugins/smokesignal/smokesignal-check.sh

      - name: PHP lint
        run: |
          sudo apt-get install -y php-cli
          find src -name '*.php' -print0 | xargs -0 -n1 php -l
