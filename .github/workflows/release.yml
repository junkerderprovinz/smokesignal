name: Release

# Cuts a SmokeSignal plugin release from a v* tag. CI is the single source of
# truth for the package and for what main advertises: build -> publish the
# GitHub release (asset goes live) -> confirm it is reachable -> ONLY THEN flip
# <!ENTITY version> in plugin/smokesignal.plg on main. main never advertises a
# version whose release asset is not live yet; a failure before the flip leaves
# main on the previous version (zero user impact, re-run the tag to heal).
#
# This .plg has no <SHA256> field, so only the version entity is flipped.
#
# MAINTAINER FLOW: add a "## X.Y.Z" block to plugin/smokesignal.plg <CHANGES>
# and `git tag vX.Y.Z` on main. You do NOT need to bump <!ENTITY version> by
# hand — CI flips it after the asset is live.
#
# workflow_dispatch = build-only dry run: builds the .txz, uploads it as an
# artifact, creates no release and touches nothing on main.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smokesignal-release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve version
        id: v
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .txz package
        run: bash plugin/pkg_build.sh "${{ steps.v.outputs.version }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: smokesignal-txz
          path: plugin/out/*

      # ---- tag-only from here ----
      - name: Extract release notes from .plg CHANGES
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ver="${{ steps.v.outputs.version }}"
          awk -v v="## $ver" '$0==v{grab=1;next} grab&&/^## /{exit} grab{print}' \
            plugin/smokesignal.plg > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::no '## $ver' block in plugin/smokesignal.plg <CHANGES> — add it before tagging"
            exit 1
          fi
          echo "---- release notes ----"; cat release-notes.md

      - name: Publish release (asset goes live first)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            plugin/out/*.txz
            plugin/out/*.md5

      - name: Confirm the release asset is reachable
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ver="${{ steps.v.outputs.version }}"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${ver}/smokesignal-${ver}.txz"
          for i in $(seq 1 10); do
            code=$(curl -fsSL -o /dev/null -w '%{http_code}' -I "$url" || true)
            [ "$code" = "200" ] && { echo "asset live: $url"; exit 0; }
            echo "waiting for asset ($code) ..."; sleep 3
          done
          echo "::error::release asset not reachable: $url"; exit 1

      - name: Flip version in smokesignal.plg on main (final step)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ver="${{ steps.v.outputs.version }}"
          sed -i -E "s#(<!ENTITY version[[:space:]]+\")[^\"]*(\">)#\1${ver}\2#" plugin/smokesignal.plg
          grep -qE "<!ENTITY version[[:space:]]+\"${ver}\">" plugin/smokesignal.plg \
            || { echo "::error::version not written into smokesignal.plg"; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- plugin/smokesignal.plg; then
            echo "smokesignal.plg already current — nothing to commit"
          else
            git add plugin/smokesignal.plg
            git commit -m "ci: release v${ver} — pin version [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
