name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  txz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure exec bit on the engine
        run: chmod +x src/usr/local/emhttp/plugins/smokesignal/smokesignal-check.sh

      - name: Build .txz package
        run: |
          ver="${{ steps.v.outputs.version }}"
          mkdir -p dist
          # archive root must be '/', i.e. paths like usr/local/emhttp/...
          tar -C src --owner=0 --group=0 -cJf "dist/smokesignal-${ver}.txz" .
          md5sum "dist/smokesignal-${ver}.txz" | tee "dist/smokesignal-${ver}.txz.md5"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smokesignal-txz
          path: dist/*

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.txz
            dist/*.md5
